# Incident fixture: order-db-deadlock
#
# Fully parameterizes all mock tool responses for this incident.
# Selected declaratively via `spec.params.incident_fixture:` in an overlay.
#
# Root cause: order-service v2.4.1 introduced a bulk-update query that acquires
# row-level locks in insertion order (non-canonical) while concurrent checkout
# writers acquire them in primary-key order — creating a deadlock cycle.
# Connection pool reaches 99% saturation. DB is the root cause here (unlike Scenario A).
# Correct action: rollback order-service to v2.4.0.

id: order-db-deadlock
description: >
  DB deadlock in order-service v2.4.1 bulk-update causes lock contention,
  pool exhaustion, and 67% checkout write errors. DB is the root cause.
timestamp: "2026-02-26T09:15:00"
correct_action:
  service: order-service
  action: rollback
  to_version: "2.4.0"
  reasoning: >
    v2.4.1 introduced a bulk inventory update query that acquires locks in
    insertion order, creating deadlock cycles with concurrent checkout writers.
    Pool exhaustion follows → 67% error rate on writes. Rollback resolves deadlock.

