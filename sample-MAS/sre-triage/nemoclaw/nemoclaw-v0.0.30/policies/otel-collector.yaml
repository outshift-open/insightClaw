---
preset:
  name: otel-collector
  description: "OpenTelemetry Collector access"

network_policies:
  otel-collector:
    name: otel-collector
    endpoints:
      - host: #{OTEL_ENDPOINT}
        port: 4318
        protocol: rest
        enforcement: enforce
        rules:
          - allow: {method: GET, path: "/**"}
          - allow: {method: POST, path: "/**"}
    binaries:
      - {path: /**}
