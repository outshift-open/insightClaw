---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # Required for OIDC trusted publishing
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: observability-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: observability-plugin/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm to v11 to fix release packaging bug with latest version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run ci-test

      - name: Build
        run: npm run build

      - name: Package artifact
        run: npm run package:artifact

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="insightClaw-${VERSION}.zip"
          cd artifact
          zip -r "../${ARCHIVE}" package/
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: observability-plugin/artifact/package
        env:
          NODE_AUTH_TOKEN: ""

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "insightClaw ${{ env.VERSION }}"
          generate_release_notes: true
          files: observability-plugin/${{ env.ARCHIVE }}
